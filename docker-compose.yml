version: '3.8'

services:
  db:
    image: postgres:15
    container_name: yoga-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-YogaLifeEnterpriseDb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:latest
    container_name: yoga-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-yoga-media};
      mc anonymous set download local/${MINIO_BUCKET:-yoga-media}/public;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    container_name: yoga-api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB:-YogaLifeEnterpriseDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - TelegramSettings__BotToken=${TELEGRAM_BOT_TOKEN:-}
      - TelegramSettings__ChatId=${TELEGRAM_CHAT_ID:-}
      - Security__AllowedOrigins__0=${APP_ORIGIN:-http://localhost}
      - Security__AllowedOrigins__1=${APP_ORIGIN_WWW:-}
      - Storage__Provider=S3
      - Storage__BucketName=${MINIO_BUCKET:-yoga-media}
      - Storage__ServiceUrl=http://minio:9000
      - Storage__AccessKey=${MINIO_ROOT_USER:-minioadmin}
      - Storage__SecretKey=${MINIO_ROOT_PASSWORD:-minioadmin}
      - Storage__ForcePathStyle=true
      - Storage__PublicHost=${MINIO_PUBLIC_HOST:-http://localhost:9000/yoga-media}
      - Storage__KeyPrefix=public
      - AdminPortal__JwtSecret=${ADMIN_JWT_SECRET:-change-me-in-production-min-32-chars!!}
    restart: always

  client:
    build:
      context: .
      dockerfile: Dockerfile.Client
    container_name: yoga-client
    profiles:
      - local
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

volumes:
  postgres-data:
  minio-data:
