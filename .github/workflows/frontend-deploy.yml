name: Deploy Blazor Frontend

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: team_4ZeZHmzGdjhTB9NdH82pbzjN
  VERCEL_PROJECT_ID: prj_xZU60Fn5Iud595WIGVXWZB9a0Xxr
  FRONTEND_PUBLIC_API_BASE_URL: ${{ vars.FRONTEND_PUBLIC_API_BASE_URL }}

permissions:
  actions: read
  contents: read

concurrency:
  group: vercel-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Static Frontend To Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build frontend
        run: |
          dotnet restore Yoga.Client/Yoga.Client.csproj
          dotnet publish Yoga.Client/Yoga.Client.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Validate public API URL
        run: |
          test -n "$FRONTEND_PUBLIC_API_BASE_URL" || {
            echo "FRONTEND_PUBLIC_API_BASE_URL GitHub variable is not configured." >&2
            exit 1
          }

          case "$FRONTEND_PUBLIC_API_BASE_URL" in
            https://*) ;;
            *)
              echo "FRONTEND_PUBLIC_API_BASE_URL must be an absolute https URL." >&2
              exit 1
              ;;
          esac

      - name: Inject public API URL into frontend runtime config
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          appsettings_path = Path("publish/wwwroot/appsettings.json")
          data = json.loads(appsettings_path.read_text(encoding="utf-8"))
          data.setdefault("Api", {})["PublicBaseUrl"] = os.environ["FRONTEND_PUBLIC_API_BASE_URL"].rstrip("/") + "/"
          appsettings_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Prepare Vercel project linkage
        run: |
          mkdir -p publish/wwwroot/.vercel
          cat > publish/wwwroot/.vercel/project.json <<'EOF'
          {"orgId":"team_4ZeZHmzGdjhTB9NdH82pbzjN","projectId":"prj_xZU60Fn5Iud595WIGVXWZB9a0Xxr"}
          EOF

      - name: Verify static bundle
        run: |
          test -f publish/wwwroot/index.html
          test -d publish/wwwroot/_framework
          grep -q '"PublicBaseUrl": "https://' publish/wwwroot/appsettings.json

      - name: Verify Vercel token access
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes vercel@38.0.0 whoami --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN"

      - name: Deploy static frontend to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          FORCE_COLOR: "0"
        run: |
          cd publish/wwwroot
          set -uo pipefail
          # Vercel CLI prints build logs + a line like "Production: https://….vercel.app".
          # Capturing raw stdout breaks GITHUB_OUTPUT and smoke checks; extract one HTTPS URL.
          set +e
          VC_OUT="$(npx --yes vercel@38.0.0 deploy --prod --yes --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN" 2>&1)"
          VC_EXIT=$?
          set -e
          printf '%s\n' "$VC_OUT"
          if [ "$VC_EXIT" -ne 0 ]; then
            echo "Vercel deploy failed (exit $VC_EXIT)." >&2
            exit "$VC_EXIT"
          fi
          deployment_url="$(printf '%s\n' "$VC_OUT" | grep -oiE 'production:\s*https://[^ ]+' | tail -1 | sed -E 's/^production:\s*//i' || true)"
          if [ -z "$deployment_url" ]; then
            deployment_url="$(printf '%s\n' "$VC_OUT" | grep -oE 'https://[a-zA-Z0-9][a-zA-Z0-9.-]*\.vercel\.app' | tail -1 || true)"
          fi
          if [ -z "$deployment_url" ]; then
            echo "Could not parse production URL from Vercel CLI output." >&2
            exit 1
          fi
          {
            echo "deployment_url<<VC_URL_EOF"
            echo "$deployment_url"
            echo "VC_URL_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Parsed deployment_url=$deployment_url"

      - name: Smoke check published frontend and API
        env:
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment_url }}
        run: |
          test -n "$DEPLOYMENT_URL" || {
            echo "Deployment URL was not returned by Vercel deploy step." >&2
            exit 1
          }

          case "$DEPLOYMENT_URL" in
            https://*) ;;
            *) DEPLOYMENT_URL="https://$DEPLOYMENT_URL" ;;
          esac

          echo "Smoke checking $DEPLOYMENT_URL"

          for route in / /about /contacts /retreats /privacy /terms /account/login; do
            curl --fail --silent --show-error --location "$DEPLOYMENT_URL$route" > /dev/null
          done

          appsettings_json="$(curl --fail --silent --show-error --location "$DEPLOYMENT_URL/appsettings.json")"
          echo "$appsettings_json" | grep -q '"PublicBaseUrl": "https://'
          echo "$appsettings_json" | grep -q '"PublicBaseUrl": "'$FRONTEND_PUBLIC_API_BASE_URL'/"'

          curl --fail --silent --show-error --location "$FRONTEND_PUBLIC_API_BASE_URL/health/live" > /dev/null
          curl --fail --silent --show-error --location "$FRONTEND_PUBLIC_API_BASE_URL/health/ready" > /dev/null
