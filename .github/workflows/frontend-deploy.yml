name: Deploy Blazor Frontend

on:
  workflow_dispatch:
  # Auto-deploy after a successful push build on main (manual-only before was why nothing appeared in the runs list).
  workflow_run:
    workflows: ["Build Blazor WASM"]
    types: [completed]
    branches: [main]

env:
  FRONTEND_PUBLIC_API_BASE_URL: ${{ vars.FRONTEND_PUBLIC_API_BASE_URL }}
  # If set (e.g. https://www.medisha.space), smoke tests use this URL instead of the raw *.vercel.app URL (avoids 401 when Deployment Protection is on).
  FRONTEND_SMOKE_URL: ${{ vars.FRONTEND_SMOKE_URL }}
  # Pin CLI so logs stay parseable across releases
  VERCEL_CLI_VERSION: "41.4.1"

permissions:
  actions: read
  contents: read

concurrency:
  group: vercel-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Static Frontend To Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        run: dotnet restore Yoga.Life.Enterprise.sln --nologo

      - name: Build solution (Release)
        run: dotnet build Yoga.Life.Enterprise.sln -c Release --no-restore --nologo

      - name: Test API
        run: dotnet test Yoga.Life.Enterprise.sln -c Release --no-build --nologo --verbosity normal

      - name: Resolve Vercel org and project IDs
        id: vercel_ids
        env:
          V_ORG: ${{ vars.VERCEL_ORG_ID }}
          V_PRJ: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          ORG="${V_ORG:-team_4ZeZHmzGdjhTB9NdH82pbzjN}"
          PRJ="${V_PRJ:-prj_xZU60Fn5Iud595WIGVXWZB9a0Xxr}"
          echo "vercel_org_id=$ORG" >> "$GITHUB_OUTPUT"
          echo "vercel_project_id=$PRJ" >> "$GITHUB_OUTPUT"
          echo "Using Vercel org=$ORG project=$PRJ (override with repo Variables VERCEL_ORG_ID / VERCEL_PROJECT_ID)"

      - name: Build frontend
        run: |
          dotnet publish Yoga.Client/Yoga.Client.csproj \
            -c Release \
            -o publish \
            --no-restore \
            --nologo

      - name: Cache-bust asset versions in index.html
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          sed -i "s/?v=20260408/?v=${SHORT_SHA}/g" publish/wwwroot/index.html
          echo "Asset version tag set to ?v=${SHORT_SHA}"

      - name: Remove source maps from publish output
        run: find publish/wwwroot/_framework -name '*.map' -delete 2>/dev/null || true

      - name: Validate public API URL
        run: |
          test -n "$FRONTEND_PUBLIC_API_BASE_URL" || {
            echo "FRONTEND_PUBLIC_API_BASE_URL GitHub variable is not configured." >&2
            exit 1
          }

          case "$FRONTEND_PUBLIC_API_BASE_URL" in
            https://*) ;;
            *)
              echo "FRONTEND_PUBLIC_API_BASE_URL must be an absolute https URL." >&2
              exit 1
              ;;
          esac

      - name: Inject public API URL into frontend runtime config
        run: python3 scripts/inject_public_api_url.py publish/wwwroot/appsettings.json "$FRONTEND_PUBLIC_API_BASE_URL"

      - name: Verify static bundle
        run: |
          test -f publish/wwwroot/index.html
          test -f publish/wwwroot/vercel.json
          test -d publish/wwwroot/_framework
          grep -q '"PublicBaseUrl": "https://' publish/wwwroot/appsettings.json

      # Vercel Root Directory empty → deploy from publish output root (this folder).
      - name: Link Vercel project (CLI)
        run: |
          mkdir -p publish/wwwroot/.vercel
          printf '%s\n' "{\"orgId\":\"${{ steps.vercel_ids.outputs.vercel_org_id }}\",\"projectId\":\"${{ steps.vercel_ids.outputs.vercel_project_id }}\"}" > publish/wwwroot/.vercel/project.json

      - name: Verify Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing secret VERCEL_TOKEN." >&2; exit 1; }
          npx --yes "vercel@${VERCEL_CLI_VERSION}" whoami --token "$VERCEL_TOKEN" || {
            echo "::error::VERCEL_TOKEN rejected (invalid or expired). Create a new token at https://vercel.com/account/tokens"
            exit 1
          }

      - name: Deploy static frontend to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -uo pipefail
          cd publish/wwwroot
          set +e
          VC_OUT="$(npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prod --yes --token "$VERCEL_TOKEN" --scope "${{ steps.vercel_ids.outputs.vercel_org_id }}" 2>&1)"
          VC_EXIT=$?
          set -e
          printf '%s\n' "$VC_OUT"
          if [ "$VC_EXIT" -ne 0 ]; then
            echo "::error::Vercel deploy failed. If you see 'Root Directory ... does not exist', set Vercel Project Settings → General → Root Directory to empty (or match the folder you deploy from). scope-not-accessible: docs/DEPLOYMENT.md#vercel-scope-not-accessible."
            exit "$VC_EXIT"
          fi
          deployment_url="$(printf '%s\n' "$VC_OUT" | grep -oiE 'production:\s*https://[^ ]+' | tail -1 | sed -E 's/^production:\s*//i' || true)"
          if [ -z "$deployment_url" ]; then
            deployment_url="$(printf '%s\n' "$VC_OUT" | grep -oE 'https://[a-zA-Z0-9][a-zA-Z0-9.-]*\.vercel\.app' | tail -1 || true)"
          fi
          if [ -z "$deployment_url" ]; then
            echo "::error::Could not parse deployment URL from Vercel output."
            exit 1
          fi
          {
            echo "deployment_url<<VC_URL_EOF"
            echo "$deployment_url"
            echo "VC_URL_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Parsed deployment_url=$deployment_url"

      # Vercel Deployment Protection → 401 without bypass: do not fail the job (deploy already succeeded).
      - name: Smoke check this deployment (required)
        env:
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment_url }}
          VERCEL_PROTECTION_BYPASS_SECRET: ${{ secrets.VERCEL_PROTECTION_BYPASS_SECRET }}
        run: |
          test -n "$DEPLOYMENT_URL" || {
            echo "Deployment URL was not set." >&2
            exit 1
          }

          case "$DEPLOYMENT_URL" in
            https://*) ;;
            *) DEPLOYMENT_URL="https://$DEPLOYMENT_URL" ;;
          esac

          echo "Smoke checking deployment URL $DEPLOYMENT_URL"
          BYPASS=()
          if [ -n "$VERCEL_PROTECTION_BYPASS_SECRET" ]; then
            BYPASS=(-H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS_SECRET")
            echo "Using x-vercel-protection-bypass"
          fi

          protected=0
          for route in / /about /contacts /retreats /privacy /terms /account/login; do
            url="$DEPLOYMENT_URL$route"
            code=$(curl -sS -o /dev/null -w '%{http_code}' -L "${BYPASS[@]}" "$url" || echo "000")
            echo "$url -> HTTP $code"
            case "$code" in
              2??|3??) ;;
              401|403)
                echo "::notice::HTTP $code (Vercel Deployment Protection). CI passes; add VERCEL_PROTECTION_BYPASS_SECRET or relax protection for production to verify anonymously."
                protected=1
                ;;
              *)
                echo "::error::Unexpected HTTP $code for $url"
                exit 1
                ;;
            esac
          done

          if [ "$protected" -eq 1 ]; then
            echo "::notice::Skipping app.css / appsettings checks while deployment is auth-protected."
            exit 0
          fi

          echo "Checking static assets"
          hdr_ct="$(curl -sS -o /dev/null -D - "${BYPASS[@]}" -L "$DEPLOYMENT_URL/app.css" | tr -d '\r' | grep -i '^content-type:' | tail -1 | cut -d: -f2- | xargs)"
          echo "GET /app.css Content-Type: $hdr_ct"
          echo "$hdr_ct" | grep -qi 'text/css' || {
            echo "Expected app.css to be text/css (got: $hdr_ct)." >&2
            exit 1
          }

          appsettings_json="$(curl -sS -L "${BYPASS[@]}" "$DEPLOYMENT_URL/appsettings.json")"
          echo "$appsettings_json" | grep -q '"PublicBaseUrl": "https://'
          echo "$appsettings_json" | grep -q '"PublicBaseUrl": "'$FRONTEND_PUBLIC_API_BASE_URL'/"'

      # Public hostname may not be wired yet → must not fail the workflow.
      - name: Smoke public site (optional)
        continue-on-error: true
        env:
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment_url }}
        run: |
          case "$DEPLOYMENT_URL" in
            https://*) ;;
            *) DEPLOYMENT_URL="https://$DEPLOYMENT_URL" ;;
          esac

          api_base="${FRONTEND_PUBLIC_API_BASE_URL%/}"
          DERIVED=""
          case "$api_base" in
            https://api.*)
              host="${api_base#https://api.}"
              DERIVED="https://www.$host"
              ;;
            http://api.*)
              host="${api_base#http://api.}"
              DERIVED="http://www.$host"
              ;;
          esac

          if [ -n "$FRONTEND_SMOKE_URL" ]; then
            PUB="$FRONTEND_SMOKE_URL"
            case "$PUB" in
              https://*) ;;
              http://*) ;;
              *) PUB="https://$PUB" ;;
            esac
          elif [ -n "$DERIVED" ]; then
            PUB="$DERIVED"
          else
            echo "No FRONTEND_SMOKE_URL and API is not https://api.* — skip optional public check."
            exit 0
          fi

          if [ "$PUB" = "$DEPLOYMENT_URL" ]; then
            echo "Public URL same as deploy URL; skip."
            exit 0
          fi

          echo "Optional: GET $PUB/ (assign domain in Vercel + DNS if this 404s)"
          if curl --fail --silent --show-error --location "$PUB/" > /dev/null; then
            echo "Public URL responded OK."
          else
            echo "::warning::$PUB not reachable (404/timeout). Vercel → Project → Domains: add $PUB and point DNS. Production deploy still succeeded at $DEPLOYMENT_URL"
            exit 1
          fi

      - name: Probe API health (non-blocking)
        continue-on-error: true
        run: |
          echo "Probing API (failure here does not roll back the frontend deploy)"
          curl --fail --silent --show-error --location "$FRONTEND_PUBLIC_API_BASE_URL/health/live" > /dev/null
          curl --fail --silent --show-error --location "$FRONTEND_PUBLIC_API_BASE_URL/health/ready" > /dev/null
          echo "API health OK"
