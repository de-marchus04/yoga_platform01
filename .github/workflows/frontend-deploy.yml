name: Deploy Blazor Frontend

on:
  workflow_dispatch:

env:
  FRONTEND_PUBLIC_API_BASE_URL: ${{ vars.FRONTEND_PUBLIC_API_BASE_URL }}
  # Pin CLI so logs stay parseable across releases
  VERCEL_CLI_VERSION: "41.4.1"

permissions:
  actions: read
  contents: read

concurrency:
  group: vercel-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Static Frontend To Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve Vercel org and project IDs
        id: vercel_ids
        env:
          V_ORG: ${{ vars.VERCEL_ORG_ID }}
          V_PRJ: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          ORG="${V_ORG:-team_4ZeZHmzGdjhTB9NdH82pbzjN}"
          PRJ="${V_PRJ:-prj_xZU60Fn5Iud595WIGVXWZB9a0Xxr}"
          echo "vercel_org_id=$ORG" >> "$GITHUB_OUTPUT"
          echo "vercel_project_id=$PRJ" >> "$GITHUB_OUTPUT"
          echo "Using Vercel org=$ORG project=$PRJ (override with repo Variables VERCEL_ORG_ID / VERCEL_PROJECT_ID)"

      - name: Build frontend
        run: |
          dotnet restore Yoga.Client/Yoga.Client.csproj
          dotnet publish Yoga.Client/Yoga.Client.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Validate public API URL
        run: |
          test -n "$FRONTEND_PUBLIC_API_BASE_URL" || {
            echo "FRONTEND_PUBLIC_API_BASE_URL GitHub variable is not configured." >&2
            exit 1
          }

          case "$FRONTEND_PUBLIC_API_BASE_URL" in
            https://*) ;;
            *)
              echo "FRONTEND_PUBLIC_API_BASE_URL must be an absolute https URL." >&2
              exit 1
              ;;
          esac

      - name: Inject public API URL into frontend runtime config
        run: python3 scripts/inject_public_api_url.py publish/wwwroot/appsettings.json "$FRONTEND_PUBLIC_API_BASE_URL"

      - name: Link Vercel project (for CLI)
        run: |
          mkdir -p publish/wwwroot/.vercel
          printf '%s\n' "{\"orgId\":\"${{ steps.vercel_ids.outputs.vercel_org_id }}\",\"projectId\":\"${{ steps.vercel_ids.outputs.vercel_project_id }}\"}" > publish/wwwroot/.vercel/project.json
          cat publish/wwwroot/.vercel/project.json

      - name: Verify static bundle
        run: |
          test -f publish/wwwroot/index.html
          test -f publish/wwwroot/vercel.json
          test -d publish/wwwroot/_framework
          grep -q '"PublicBaseUrl": "https://' publish/wwwroot/appsettings.json

      - name: Verify Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing secret VERCEL_TOKEN." >&2; exit 1; }
          npx --yes "vercel@${VERCEL_CLI_VERSION}" whoami --token "$VERCEL_TOKEN" || {
            echo "::error::VERCEL_TOKEN rejected (invalid or expired). Create a new token at https://vercel.com/account/tokens"
            exit 1
          }

      - name: Deploy static frontend to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -uo pipefail
          cd publish/wwwroot
          set +e
          VC_OUT="$(npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prod --yes --token "$VERCEL_TOKEN" --scope "${{ steps.vercel_ids.outputs.vercel_org_id }}" 2>&1)"
          VC_EXIT=$?
          set -e
          printf '%s\n' "$VC_OUT"
          if [ "$VC_EXIT" -ne 0 ]; then
            echo "::error::Vercel deploy failed. If you see 'scope-not-accessible' or 'do not have access to the specified account', the VERCEL_TOKEN must be created while logged into Vercel as a member of that team, or set GitHub Variables VERCEL_ORG_ID / VERCEL_PROJECT_ID to match a project your token can access. See docs/DEPLOYMENT.md#vercel-scope-not-accessible."
            exit "$VC_EXIT"
          fi
          deployment_url="$(printf '%s\n' "$VC_OUT" | grep -oiE 'production:\s*https://[^ ]+' | tail -1 | sed -E 's/^production:\s*//i' || true)"
          if [ -z "$deployment_url" ]; then
            deployment_url="$(printf '%s\n' "$VC_OUT" | grep -oE 'https://[a-zA-Z0-9][a-zA-Z0-9.-]*\.vercel\.app' | tail -1 || true)"
          fi
          if [ -z "$deployment_url" ]; then
            echo "::error::Could not parse deployment URL from Vercel output."
            exit 1
          fi
          {
            echo "deployment_url<<VC_URL_EOF"
            echo "$deployment_url"
            echo "VC_URL_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Parsed deployment_url=$deployment_url"

      - name: Smoke check deployed frontend (required)
        env:
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment_url }}
        run: |
          test -n "$DEPLOYMENT_URL" || {
            echo "Deployment URL was not set." >&2
            exit 1
          }

          case "$DEPLOYMENT_URL" in
            https://*) ;;
            *) DEPLOYMENT_URL="https://$DEPLOYMENT_URL" ;;
          esac

          echo "Smoke checking $DEPLOYMENT_URL"

          for route in / /about /contacts /retreats /privacy /terms /account/login; do
            curl --fail --silent --show-error --location "$DEPLOYMENT_URL$route" > /dev/null
          done

          echo "Checking static assets are not served as HTML"
          hdr_ct="$(curl --fail --silent --show-error --location -o /dev/null -D - "$DEPLOYMENT_URL/app.css" | tr -d '\r' | grep -i '^content-type:' | tail -1 | cut -d: -f2- | xargs)"
          echo "GET /app.css Content-Type: $hdr_ct"
          echo "$hdr_ct" | grep -qi 'text/css' || {
            echo "Expected app.css to be text/css (got: $hdr_ct). SPA rewrite may be misconfigured." >&2
            exit 1
          }

          appsettings_json="$(curl --fail --silent --show-error --location "$DEPLOYMENT_URL/appsettings.json")"
          echo "$appsettings_json" | grep -q '"PublicBaseUrl": "https://'
          echo "$appsettings_json" | grep -q '"PublicBaseUrl": "'$FRONTEND_PUBLIC_API_BASE_URL'/"'

      - name: Probe API health (non-blocking)
        continue-on-error: true
        run: |
          echo "Probing API (failure here does not roll back the frontend deploy)"
          curl --fail --silent --show-error --location "$FRONTEND_PUBLIC_API_BASE_URL/health/live" > /dev/null
          curl --fail --silent --show-error --location "$FRONTEND_PUBLIC_API_BASE_URL/health/ready" > /dev/null
          echo "API health OK"
