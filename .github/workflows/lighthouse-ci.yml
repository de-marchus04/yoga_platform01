# Lighthouse CI + programmatic layout-shift JSON + axe sweep (quality-urls.json matrix).
# Runs on GitHub-hosted ubuntu-latest (Linux VM — not your local OS).
# Artifacts: lighthouse-ci-reports, layout-shifts-report.json, axe-report.json.
# workflow_dispatch: optional input quality_base_url (e.g. https://xxx.vercel.app) to run Playwright steps against a preview instead of local publish.
#
# Local (after publish): npm run quality:playwright — serve on 5234 + layout-shift + axe.
# Full local chain: npm run quality:local

name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      quality_base_url:
        description: "Optional origin for layout-shift + axe only (e.g. Vercel preview URL). Leave empty to use local publish + serve."
        required: false
        default: ""

env:
  # inputs exist only for workflow_dispatch; avoid touching github.event.inputs on push/PR
  QUALITY_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.quality_base_url || '' }}

permissions:
  contents: read

jobs:
  lhci:
    name: Lighthouse + quality matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Publish Blazor WebAssembly
        run: |
          dotnet restore Yoga.Client/Yoga.Client.csproj --nologo
          dotnet publish Yoga.Client/Yoga.Client.csproj -c Release -o publish --no-restore --nologo

      - name: Install npm dependencies (Playwright + axe)
        run: npm install --no-audit --no-fund

      - name: Prep Lighthouse URL list from quality-urls.json
        run: node scripts/prep-lighthouserc.mjs

      - name: Install Chrome for Lighthouse
        uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          chrome-version: stable
          install-dependencies: true

      # Hyphen in output name: use bracket form — dot form is parsed as subtraction, leaving CHROME_PATH empty.
      - name: Verify Chrome binary
        env:
          CHROME_BIN: ${{ steps.chrome.outputs['chrome-path'] }}
        run: |
          echo "CHROME_BIN=$CHROME_BIN"
          test -n "$CHROME_BIN"
          test -x "$CHROME_BIN"
          "$CHROME_BIN" --version

      - name: Run Lighthouse CI
        env:
          CHROME_PATH: ${{ steps.chrome.outputs['chrome-path'] }}
        run: npx --yes @lhci/cli@0.14.0 autorun --config=./lighthouserc.ci.json

      - name: Lighthouse summary (log)
        if: always()
        run: node scripts/lhci-summary.mjs

      - name: Install Playwright Chromium
        if: always()
        run: npx playwright install chromium

      - name: Layout-shift capture + axe (local serve or preview URL)
        if: always()
        env:
          LAYOUT_SHIFT_FAIL: "0"
          AXE_FAIL_SERIOUS: "0"
        run: |
          if [ -n "$QUALITY_BASE_URL" ]; then
            echo "Using QUALITY_BASE_URL=$QUALITY_BASE_URL for Playwright steps"
            node scripts/layout-shift-capture.mjs
            node scripts/axe-capture.mjs
          else
            npx start-server-and-test \
              "npx --yes serve@14 publish/wwwroot -l 5234 -s" \
              "http-get://127.0.0.1:5234" \
              "node scripts/layout-shift-capture.mjs && node scripts/axe-capture.mjs"
          fi

      - name: Verify Lighthouse output exists
        if: always()
        run: |
          echo "=== .lighthouseci ==="
          ls -laR .lighthouseci 2>/dev/null || true
          echo "=== lighthouse-ci-reports ==="
          ls -laR lighthouse-ci-reports 2>/dev/null || true
          n=$(find .lighthouseci lighthouse-ci-reports -type f 2>/dev/null | wc -l)
          if [ "$n" -eq 0 ]; then
            echo "::error::Lighthouse CI wrote no files (check Chrome CHROME_PATH and collect logs above)."
            exit 1
          fi
          echo "Report files: $n"

      - name: List report files (for log)
        if: always()
        run: |
          echo "=== .lighthouseci contents ==="
          ls -laR .lighthouseci 2>/dev/null || echo "(no .lighthouseci)"
          echo "=== lighthouse-ci-reports ==="
          ls -laR lighthouse-ci-reports 2>/dev/null || echo "(no lighthouse-ci-reports)"

      - name: Upload Lighthouse + quality JSON artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-ci-reports
          path: |
            .lighthouseci
            lighthouse-ci-reports
            layout-shifts-report.json
            axe-report.json
          if-no-files-found: warn
