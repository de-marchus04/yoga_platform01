name: Build And Deploy Blazor WASM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Yoga.Client/Yoga.Client.csproj

      - name: Publish Blazor WebAssembly
        run: |
          dotnet publish Yoga.Client/Yoga.Client.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Archive publish output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm-publish
          path: publish/wwwroot

      - name: Prepare Vercel project linkage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p publish/wwwroot/.vercel
          cat > publish/wwwroot/.vercel/project.json <<EOF
          {"orgId":"team_4ZeZHmzGdjhTB9NdH82pbzjN","projectId":"prj_xZU60Fn5Iud595WIGVXWZB9a0Xxr"}
          EOF

      - name: Deploy static publish to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd publish/wwwroot
          npx vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
