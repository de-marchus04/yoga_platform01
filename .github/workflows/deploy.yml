name: Build Blazor WASM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Blazor Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore Yoga.Life.Enterprise.sln --nologo

      - name: Build solution (Release)
        run: dotnet build Yoga.Life.Enterprise.sln -c Release --no-restore --nologo

      - name: Test API
        run: dotnet test Yoga.Life.Enterprise.sln -c Release --no-build --nologo --verbosity normal

      - name: Publish Blazor WebAssembly
        run: |
          dotnet publish Yoga.Client/Yoga.Client.csproj \
            -c Release \
            -o publish \
            --no-restore \
            --nologo

      - name: Archive publish output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm-publish
          path: publish/wwwroot
